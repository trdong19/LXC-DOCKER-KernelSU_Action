name: 小米6 Kernel CI（稳定增强版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 1️⃣ 环境变量
      # =========================
      - name: Load config
        run: |
          cat config.env >> $GITHUB_ENV

      # =========================
      # 2️⃣ 依赖
      # =========================
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git make bc bison flex zip ccache \
          libssl-dev libelf-dev wget curl python3 \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      # =========================
      # 3️⃣ Workspace
      # =========================
      - name: Prepare workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      # =========================
      # 4️⃣ Cache Clang（加速）
      # =========================
      - name: Cache Clang
        uses: actions/cache@v4
        with:
          path: kernel_workspace/clang-aosp
          key: clang-aosp-android13

      - name: Setup Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [ ! -d clang-aosp ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android13-release clang-aosp
          fi

      # =========================
      # 5️⃣ Cache Kernel Source（避免重复下载）
      # =========================
      - name: Cache Kernel Source
        uses: actions/cache@v4
        with:
          path: kernel_workspace/android-kernel
          key: kernel-${{ env.KERNEL_SOURCE_BRANCH }}

      - name: Clone kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [ ! -d android-kernel ]; then
            git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
          fi

      # =========================
      # 6️⃣ 强制清理（关键防炸点）
      # =========================
      - name: Clean kernel build (SAFE MODE)
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          rm -rf out
          make mrproper || true

      # =========================
      # 7️⃣ Docker/LXC config merge
      # =========================
      - name: Apply Docker/LXC config
        if: env.ENABLE_LXC_DOCKER == 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace

          cat > docker_config.txt << 'EOF'
          			CONFIG_NAMESPACES=y
          			CONFIG_UTS_NS=y
          			CONFIG_IPC_NS=y
          			CONFIG_PID_NS=y
          			CONFIG_NET_NS=y
          			CONFIG_USER_NS=y
          
          			CONFIG_DEVPTS_MULTIPLE_INSTANCES=y
          
          			CONFIG_CGROUPS=y
          			CONFIG_CGROUP_DEVICE=y
          			CONFIG_CGROUP_CPUACCT=y
          			CONFIG_CGROUP_FREEZER=y
          			CONFIG_CPUSETS=y
          			CONFIG_MEMCG=y
          			CONFIG_MEMCG_SWAP=y
          			CONFIG_MEMCG_SWAP_ENABLED=y
          			CONFIG_MEMCG_KMEM=y
          			CONFIG_CGROUP_PIDS=y
          
          			CONFIG_OVERLAY_FS=y
          			CONFIG_OVERLAY_FS_REDIRECT_DIR=y
          			CONFIG_OVERLAY_FS_INDEX=y
          
          			CONFIG_VETH=y
          			CONFIG_BRIDGE=y
          			CONFIG_NETFILTER=y
          			CONFIG_IP_NF_NAT=y
          			CONFIG_IP_NF_TARGET_MASQUERADE=y
          
          			CONFIG_EXT4_FS=y
          			EOF

      # =========================
      # 8️⃣ Config build（稳定流程）
      # =========================
      - name: Configure kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          export ARCH=arm64
          export O=out

          make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

          ../docker_config.txt >> out/.config || true

          make O=out ARCH=arm64 olddefconfig

      # =========================
      # 9️⃣ ccache（加速编译）
      # =========================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # =========================
      # 🔟 Build kernel（不会污染 config）
      # =========================
      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/clang-r450784d/bin:$PATH
          export KBUILD_BUILD_HOST=CI
          export KBUILD_BUILD_USER=MI6

          if [ "${{ env.LLVM_CONFIG }}" = "y" ]; then
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              LLVM=1 LLVM_IAS=1 \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
          else
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang"
          fi

      # =========================
      # 11️⃣ Pack
      # =========================
      - name: Pack kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace

          git clone https://github.com/osm0sis/AnyKernel3

          cp android-kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

          rm -rf AnyKernel3/.git*

      # =========================
      # 12️⃣ Upload
      # =========================
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_ZIP_NAME }}
          path: kernel_workspace/AnyKernel3/*
