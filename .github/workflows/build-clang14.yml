name: 小米6 Kernel CI（稳定增强版 FIXED）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # ENV
      # =========================
      - name: Load config
        run: |
          cat config.env >> $GITHUB_ENV

      # =========================
      # deps
      # =========================
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git make bc bison flex zip ccache \
          libssl-dev libelf-dev wget curl python3 \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      # =========================
      # workspace
      # =========================
      - name: Prepare workspace
        run: mkdir -p kernel_workspace

      # =========================
      # clang cache
      # =========================
      - name: Cache Clang
        uses: actions/cache@v4
        with:
          path: kernel_workspace/clang
          key: clang-aosp-android13

      - name: Setup Clang
        run: |
          cd kernel_workspace
          if [ ! -d clang ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
              -b android13-release clang
          fi

      # =========================
      # kernel cache
      # =========================
      - name: Cache Kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace/android-kernel
          key: kernel-mi6-${{ env.KERNEL_SOURCE_BRANCH }}

      - name: Clone kernel
        run: |
          cd kernel_workspace
          if [ ! -d android-kernel ]; then
            git clone ${{ env.KERNEL_SOURCE }} \
              -b ${{ env.KERNEL_SOURCE_BRANCH }} \
              --depth=1 android-kernel
          fi

      # =========================
      # clean (FIXED)
      # =========================
      - name: Clean kernel
        run: |
          cd kernel_workspace/android-kernel
          make mrproper || true
          rm -rf out

      # =========================
      # docker config (FIXED CORE)
      # =========================
      - name: Apply Docker config
        if: env.ENABLE_LXC_DOCKER == 'true'
        run: |
          cd kernel_workspace

          cat > docker_config.txt << 'EOF'
              CONFIG_NAMESPACES=y
              CONFIG_UTS_NS=y
              CONFIG_IPC_NS=y
              CONFIG_PID_NS=y
              CONFIG_NET_NS=y
              CONFIG_USER_NS=y
              
              CONFIG_CGROUPS=y
              CONFIG_CGROUP_DEVICE=y
              CONFIG_CGROUP_CPUACCT=y
              CONFIG_CGROUP_FREEZER=y
              CONFIG_CPUSETS=y
              CONFIG_MEMCG=y
              CONFIG_CGROUP_PIDS=y
              
              CONFIG_BLK_CGROUP=y
              CONFIG_CGROUP_SCHED=y
              
              CONFIG_OVERLAY_FS=y
              
              CONFIG_VETH=y
              CONFIG_BRIDGE=y
              CONFIG_MACVLAN=y
              CONFIG_IPVLAN=y
              
              CONFIG_NETFILTER=y
              CONFIG_NF_NAT=y
              CONFIG_IP_NF_NAT=y
              CONFIG_IP_NF_TARGET_MASQUERADE=y
              
              CONFIG_EXT4_FS=y
              EOF

      # =========================
      # config build FIXED (关键)
      # =========================
      - name: Configure kernel
        run: |
          cd kernel_workspace/android-kernel

          export ARCH=arm64
          export O=out

          make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

          # 🔥 正确 merge（不是 echo）
          scripts/kconfig/merge_config.sh -m out/.config ../docker_config.txt

          # 🔥 强制修复依赖（关键）
          make O=out ARCH=arm64 olddefconfig

          # 🔥 强制 enable（防 Kconfig 吃掉）
          scripts/config --enable CGROUPS
          scripts/config --enable MEMCG
          scripts/config --enable NAMESPACES
          scripts/config --enable PID_NS
          scripts/config --enable IPC_NS
          scripts/config --enable VETH
          scripts/config --enable BRIDGE
          scripts/config --enable OVERLAY_FS

          make O=out ARCH=arm64 olddefconfig

      # =========================
      # ccache
      # =========================
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # =========================
      # build FIXED
      # =========================
      - name: Build kernel
        run: |
          cd kernel_workspace/android-kernel

          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
          export KBUILD_BUILD_HOST=MI6
          export KBUILD_BUILD_USER=CI

          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang" \
            LLVM=1 LLVM_IAS=1 \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-"

      # =========================
      # AnyKernel FIXED
      # =========================
      - name: Pack kernel
        run: |
          cd kernel_workspace

          git clone https://github.com/osm0sis/AnyKernel3

          cp android-kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

          cd AnyKernel3
          zip -r9 Mi6-kernel.zip ./*

      # =========================
      # upload
      # =========================
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_ZIP_NAME }}
          path: kernel_workspace/AnyKernel3/Mi6-kernel.zip
