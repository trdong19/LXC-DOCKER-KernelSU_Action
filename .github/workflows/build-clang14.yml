name: Mi6 Docker Kernel CI（Extreme Stable）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 1. ENV
      # =========================
      - name: Load config
        run: |
          cat config.env >> $GITHUB_ENV

      # =========================
      # 2. deps
      # =========================
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git make bc bison flex zip ccache \
          libssl-dev libelf-dev curl wget python3

      # =========================
      # 3. workspace
      # =========================
      - name: Setup workspace
        run: mkdir -p kernel_workspace

      # =========================
      # 4. clang
      # =========================
      - name: Clang
        run: |
          cd kernel_workspace
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android13-release clang

      # =========================
      # 5. kernel source (NO CACHE)
      # =========================
      - name: Kernel source
        run: |
          cd kernel_workspace
          git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel

      # =========================
      # 6. CLEAN (FIXED)
      # =========================
      - name: Clean
        run: |
          cd kernel_workspace/android-kernel
          git reset --hard
          git clean -fdx
          rm -rf out
          make mrproper || true

      # =========================
      # 7. Docker config
      # =========================
      - name: Docker config
        run: |
          cat > kernel_workspace/docker_config.txt << 'EOF'

              # ---- Namespaces ----
              CONFIG_NAMESPACES=y
              CONFIG_UTS_NS=y
              CONFIG_IPC_NS=y
              CONFIG_PID_NS=y
              CONFIG_NET_NS=y
              CONFIG_USER_NS=y
              
              # ---- Cgroups (v1) ----
              CONFIG_CGROUPS=y
              CONFIG_CGROUP_DEVICE=y
              CONFIG_CGROUP_CPUACCT=y
              CONFIG_CGROUP_FREEZER=y
              CONFIG_CGROUP_SCHED=y
              CONFIG_CPUSETS=y
              CONFIG_MEMCG=y
              CONFIG_MEMCG_SWAP=y
              CONFIG_MEMCG_SWAP_ENABLED=y
              CONFIG_CGROUP_PIDS=y
              # Optional network QoS cgroups
              CONFIG_CGROUP_NET_PRIO=y
              CONFIG_CGROUP_NET_CLASSID=y
              
              # ---- Storage ----
              CONFIG_OVERLAY_FS=y
              CONFIG_EXT4_FS=y
              CONFIG_EXT4_FS_POSIX_ACL=y
              
              # ---- Virtual network interfaces ----
              CONFIG_VETH=y
              CONFIG_BRIDGE=y
              CONFIG_MACVLAN=y
              CONFIG_IPVLAN=y
              CONFIG_DUMMY=y
              
              # ---- Netfilter / iptables ----
              CONFIG_NETFILTER=y
              CONFIG_NF_CONNTRACK=y
              CONFIG_NF_NAT=y
              CONFIG_IP_NF_IPTABLES=y
              CONFIG_IP_NF_NAT=y
              CONFIG_IP_NF_TARGET_MASQUERADE=y
              CONFIG_NF_NAT_IPV4=y
              # Extra xtables match/target modules often used by Docker
              CONFIG_NETFILTER_XT_MATCH_COMMENT=y
              CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
              
              # ---- Misc requirements ----
              CONFIG_EPOLL=y
              CONFIG_EVENTFD=y
              CONFIG_TIMERFD=y
              CONFIG_UNIX=y
              CONFIG_TMPFS=y
              
              # ---- Security ----
              CONFIG_SECCOMP=y
              CONFIG_SECCOMP_FILTER=y
              
              EOF

      # =========================
      # 8. build config (CORRECT)
      # =========================
      - name: Configure
        run: |
          cd kernel_workspace/android-kernel

          export ARCH=arm64
          export O=out

          make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

          cat ../docker_config.txt >> out/.config
          make O=out ARCH=arm64 olddefconfig

      # =========================
      # 9. build
      # =========================
      - name: Build
        run: |
          cd kernel_workspace/android-kernel

          export PATH=$PWD/../clang/bin:$PATH

          make -j$(nproc) O=out ARCH=arm64 \
            CC="clang" \
            LLVM=1 LLVM_IAS=1

      # =========================
      # 10. pack
      # =========================
      - name: Pack
        run: |
          cd kernel_workspace
          git clone https://github.com/osm0sis/AnyKernel3
          cp android-kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

      # =========================
      # 11. upload
      # =========================
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_ZIP_NAME }}
          path: kernel_workspace/AnyKernel3/*
