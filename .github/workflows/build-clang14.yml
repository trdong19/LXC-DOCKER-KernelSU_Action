name: 小米6 Kernel CI（稳定增强版 · Docker 全量支持）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 1️⃣ 加载环境变量
      # =========================
      - name: Load config
        run: |
          cat config.env >> $GITHUB_ENV

      # =========================
      # 2️⃣ 安装依赖
      # =========================
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git make bc bison flex zip ccache \
          libssl-dev libelf-dev wget curl python3 \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      # =========================
      # 3️⃣ 准备工作目录
      # =========================
      - name: Prepare workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      # =========================
      # 4️⃣ 缓存 Clang
      # =========================
      - name: Cache Clang
        uses: actions/cache@v4
        with:
          path: kernel_workspace/clang-aosp
          key: clang-aosp-android13

      - name: Setup Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [ ! -d clang-aosp ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android13-release clang-aosp
          fi

      # =========================
      # 5️⃣ 缓存内核源码
      # =========================
      - name: Cache Kernel Source
        uses: actions/cache@v4
        with:
          path: kernel_workspace/android-kernel
          key: kernel-${{ env.KERNEL_SOURCE_BRANCH }}

      - name: Clone kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [ ! -d android-kernel ]; then
            git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
          fi

      # =========================
      # 6️⃣ 清理构建缓存
      # =========================
      - name: Clean kernel build
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          rm -rf out
          make mrproper || true

      # =========================
      # 7️⃣ 生成 Docker/LXC 配置（仅当开启时）
      # =========================
      - name: Apply Docker/LXC config
        if: env.ENABLE_LXC_DOCKER == 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace

          cat > docker_config.txt << 'TXT_EOF'
              # ---------- 必备 namespace ----------
              CONFIG_NAMESPACES=y
              CONFIG_UTS_NS=y
              CONFIG_IPC_NS=y
              CONFIG_PID_NS=y
              CONFIG_NET_NS=y
              CONFIG_USER_NS=y
              CONFIG_MOUNT_NS=y
              
              # ---------- 设备终端 ----------
              CONFIG_DEVPTS_MULTIPLE_INSTANCES=y
              
              # ---------- Cgroup 子系统（Docker 依赖 v1）----------
              CONFIG_CGROUPS=y
              CONFIG_CGROUP_DEVICE=y
              CONFIG_CGROUP_CPUACCT=y
              CONFIG_CGROUP_FREEZER=y
              CONFIG_CPUSETS=y
              CONFIG_MEMCG=y
              CONFIG_MEMCG_SWAP=y
              CONFIG_MEMCG_SWAP_ENABLED=y
              CONFIG_MEMCG_KMEM=y
              CONFIG_CGROUP_PIDS=y
              CONFIG_BLK_CGROUP=y
              CONFIG_CGROUP_SCHED=y
              CONFIG_CFS_BANDWIDTH=y
              
              # ---------- cgroupv1 增强支持（4.4 内核专用）----------
              CONFIG_CGROUP_PERF=y
              CONFIG_CGROUP_SCHEDTUNE=y
              CONFIG_FAIR_GROUP_SCHED=y
              CONFIG_RT_GROUP_SCHED=y
              CONFIG_CGROUP_NET_PRIO=y
              CONFIG_CGROUP_NET_CLASSID=y
              CONFIG_CGROUP_BPF=y
              
              # ---------- OverlayFS 存储驱动 ----------
              CONFIG_OVERLAY_FS=y
              CONFIG_OVERLAY_FS_REDIRECT_DIR=y
              CONFIG_OVERLAY_FS_INDEX=y
              
              # ---------- 虚拟网络接口 ----------
              CONFIG_VETH=y
              CONFIG_BRIDGE=y
              CONFIG_BRIDGE_NETFILTER=y
              CONFIG_MACVLAN=y
              CONFIG_IPVLAN=y
              CONFIG_DUMMY=y
              CONFIG_VXLAN=y
              CONFIG_BRIDGE_VLAN_FILTERING=y
              
              # ---------- Netfilter / iptables（Docker 网络核心）----------
              CONFIG_NETFILTER=y
              CONFIG_NF_CONNTRACK=y
              CONFIG_NF_NAT=y
              CONFIG_NF_NAT_IPV4=y
              CONFIG_IP_NF_IPTABLES=y
              CONFIG_IP_NF_NAT=y
              CONFIG_IP_NF_TARGET_MASQUERADE=y
              CONFIG_IP_NF_TARGET_REDIRECT=y
              CONFIG_NETFILTER_XT_MATCH_COMMENT=y
              CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
              CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
              CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
              CONFIG_NETFILTER_XT_MARK=y
              CONFIG_NETFILTER_XT_MATCH_IPVS=y
              
              # ---------- IPVS（负载均衡支持）----------
              CONFIG_IP_VS=y
              CONFIG_IP_VS_NFCT=y
              CONFIG_IP_VS_PROTO_TCP=y
              CONFIG_IP_VS_PROTO_UDP=y
              CONFIG_IP_VS_RR=y
              
              # ---------- 文件系统支持 ----------
              CONFIG_EXT4_FS=y
              CONFIG_EXT4_FS_POSIX_ACL=y
              CONFIG_EXT4_FS_SECURITY=y
              CONFIG_BTRFS_FS=y
              CONFIG_BTRFS_FS_POSIX_ACL=y
              
              # ---------- 加密网络支持（可选）----------
              CONFIG_CRYPTO=y
              CONFIG_CRYPTO_AEAD=y
              CONFIG_CRYPTO_GCM=y
              CONFIG_CRYPTO_SEQIV=y
              CONFIG_CRYPTO_GHASH=y
              CONFIG_XFRM=y
              CONFIG_XFRM_USER=y
              CONFIG_XFRM_ALGO=y
              CONFIG_INET_ESP=y
              CONFIG_INET_XFRM_MODE_TRANSPORT=y
              
              # ---------- FTP/TFTP 支持（容器内使用）----------
              CONFIG_NF_NAT_FTP=y
              CONFIG_NF_CONNTRACK_FTP=y
              CONFIG_NF_NAT_TFTP=y
              CONFIG_NF_CONNTRACK_TFTP=y
              
              # ---------- 安全选项 ----------
              CONFIG_SECCOMP=y
              CONFIG_SECCOMP_FILTER=y
              CONFIG_KEYS=y
              CONFIG_POSIX_MQUEUE=y
              
              # ---------- 存储驱动支持 ----------
              CONFIG_BLK_DEV_DM=y
              CONFIG_DM_THIN_PROVISIONING=y
              TXT_EOF

      # =========================
      # 8️⃣ 内核配置（修正致命错误：补上 cat）
      # =========================
      - name: Configure kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          export ARCH=arm64
          export O=out

          # 载入原始 defconfig
          make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

          # 如果存在 docker_config.txt 才合并（避免步骤跳过时报错）
          if [ -f ../docker_config.txt ]; then
            cat ../docker_config.txt >> out/.config
          fi

          # 补齐所有依赖选项
          make O=out ARCH=arm64 olddefconfig

      # =========================
      # 9️⃣ 设置 ccache（加速编译）
      # =========================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # =========================
      # 🔟 编译内核（带日志保存）
      # =========================
      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          export PATH="$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/clang-r450784d/bin:$PATH"
          export KBUILD_BUILD_HOST=CI
          export KBUILD_BUILD_USER=MI6

          if [ "${{ env.LLVM_CONFIG }}" = "y" ]; then
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              LLVM=1 LLVM_IAS=1 \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-" 2>&1 | tee build.log
          else
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-" 2>&1 | tee build.log
          fi

      # =========================
      # 11️⃣ 打包内核
      # =========================
      - name: Pack kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone https://github.com/osm0sis/AnyKernel3
          IMAGE_FILE="${{ env.KERNEL_IMAGE_NAME }}"
          if [ -z "$IMAGE_FILE" ]; then
            IMAGE_FILE="Image.gz-dtb"
          fi
          cp android-kernel/out/arch/arm64/boot/${IMAGE_FILE} AnyKernel3/
          rm -rf AnyKernel3/.git*

      # =========================
      # 12️⃣ 上传内核包
      # =========================
      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_ZIP_NAME }}
          path: kernel_workspace/AnyKernel3/*

      # =========================
      # 13️⃣ 上传编译日志
      # =========================
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-log
          path: kernel_workspace/android-kernel/build.log
          if-no-files-found: warn