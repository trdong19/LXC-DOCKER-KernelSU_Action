name: 小米6 Docker/LXC 内核构建（最终稳定版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - uses: actions/checkout@v4

      - name: 读取配置
        run: |
          cat config.env >> $GITHUB_ENV

      - name: 安装编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y git make bc bison ccache openssl zip kmod cpio flex libelf-dev curl libssl-dev wget device-tree-compiler python3 binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: 初始化工作目录
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      - name: 下载 Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android13-release clang-aosp

      - name: 下载内核源码
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1

      - name: 应用 Docker/LXC 内核配置
        if: env.ENABLE_LXC_DOCKER == 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace

          cat > docker_config.txt << 'EOF'
          CONFIG_NAMESPACES=y
          CONFIG_UTS_NS=y
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_USER_NS=y

          CONFIG_DEVPTS_MULTIPLE_INSTANCES=y

          CONFIG_CGROUPS=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CPUSETS=y
          CONFIG_MEMCG=y
          CONFIG_MEMCG_SWAP=y
          CONFIG_MEMCG_SWAP_ENABLED=y
          CONFIG_MEMCG_KMEM=y
          CONFIG_CFS_BANDWIDTH=y
          CONFIG_FAIR_GROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y

          CONFIG_BLK_CGROUP=y
          CONFIG_CFQ_GROUP_IOSCHED=y
          CONFIG_BLK_DEV_THROTTLING=y

          CONFIG_OVERLAY_FS=y
          CONFIG_OVERLAY_FS_REDIRECT_DIR=y
          CONFIG_OVERLAY_FS_INDEX=y

          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_NETFILTER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MATCH_COMMENT=y
          CONFIG_NETFILTER_XT_MATCH_MULTIPORT=y

          CONFIG_IP_NF_NAT=y
          CONFIG_NF_NAT=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y

          CONFIG_IP_VS=y
          CONFIG_IP_VS_PROTO_TCP=y
          CONFIG_IP_VS_PROTO_UDP=y
          CONFIG_IP_VS_RR=y
          CONFIG_IP_VS_NFCT=y

          CONFIG_VXLAN=y
          CONFIG_MACVLAN=y
          CONFIG_IPVLAN=y
          CONFIG_BRIDGE_VLAN_FILTERING=y

          CONFIG_EXT4_FS=y
          CONFIG_EXT4_FS_POSIX_ACL=y
          CONFIG_EXT4_FS_SECURITY=y

          CONFIG_BTRFS_FS=y
          CONFIG_BTRFS_FS_POSIX_ACL=y

          CONFIG_BLK_DEV_DM=y
          CONFIG_DM_THIN_PROVISIONING=y
          EOF

          cd android-kernel

          export ARCH=arm64
          export O=out

          make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

          if [ -f scripts/kconfig/merge_config.sh ]; then
            scripts/kconfig/merge_config.sh -m out/.config ../docker_config.txt
          else
            cat ../docker_config.txt >> out/.config
          fi

          make O=out ARCH=arm64 olddefconfig

      - name: 设置 ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      - name: 编译内核（关键：不重新加载 defconfig）
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/clang-r450784d/bin:$PATH
          export KBUILD_BUILD_HOST=Android
          export KBUILD_BUILD_USER=DockerKernel

          if [ "${{ env.LLVM_CONFIG }}" = "y" ]; then
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-" \
              LLVM=1 LLVM_IAS=1
          else
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
          fi

      - name: 打包内核
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone https://github.com/osm0sis/AnyKernel3

          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=1;/is_slot_device=0;/g' AnyKernel3/anykernel.sh

          cp android-kernel/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/

          rm -rf AnyKernel3/.git*

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_ZIP_NAME }}
          path: kernel_workspace/AnyKernel3/*
