name: 小米6 Kernel CI（稳定增强版 · Docker 全量支持）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 1️⃣ 加载环境变量
      # =========================
      - name: Load config
        run: |
          cat config.env >> $GITHUB_ENV

      # =========================
      # 2️⃣ 安装依赖
      # =========================
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git make bc bison flex zip ccache \
          libssl-dev libelf-dev wget curl python3 \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      # =========================
      # 3️⃣ 准备工作目录
      # =========================
      - name: Prepare workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      # =========================
      # 4️⃣ 缓存 Clang
      # =========================
      - name: Cache Clang
        uses: actions/cache@v4
        with:
          path: kernel_workspace/clang-aosp
          key: clang-aosp-android13

      - name: Setup Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [ ! -d clang-aosp ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android13-release clang-aosp
          fi

      # =========================
      # 5️⃣ 缓存内核源码
      # =========================
      - name: Cache Kernel Source
        uses: actions/cache@v4
        with:
          path: kernel_workspace/android-kernel
          key: kernel-${{ env.KERNEL_SOURCE_BRANCH }}

      - name: Clone kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [ ! -d android-kernel ]; then
            git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
          fi

      # =========================
      # 6️⃣ 清理构建缓存
      # =========================
      - name: Clean kernel build
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          rm -rf out
          make mrproper || true

      # =========================
      # 7️⃣ 生成 Docker/LXC 配置（仅当开启时）
      # =========================
      - name: Apply Docker/LXC config
        if: env.ENABLE_LXC_DOCKER == 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace

          cat > docker_config.txt << 'EOF'
              # ---------- 必备 namespace ----------
              CONFIG_NAMESPACES=y
              CONFIG_UTS_NS=y
              CONFIG_IPC_NS=y
              CONFIG_PID_NS=y
              CONFIG_NET_NS=y
              CONFIG_USER_NS=y
              CONFIG_MOUNT_NS=y
              
              # ---------- 设备终端 ----------
              CONFIG_DEVPTS_MULTIPLE_INSTANCES=y
              
              # ---------- Cgroup 子系统（Docker 依赖 v1）----------
              CONFIG_CGROUPS=y
              CONFIG_CGROUP_DEVICE=y
              CONFIG_CGROUP_CPUACCT=y
              CONFIG_CGROUP_FREEZER=y
              CONFIG_CPUSETS=y
              CONFIG_MEMCG=y
              CONFIG_MEMCG_SWAP=y
              CONFIG_MEMCG_SWAP_ENABLED=y
              CONFIG_MEMCG_KMEM=y
              CONFIG_CGROUP_PIDS=y
              # 后续两项对 Docker 的 blkio 与 CPU 限制至关重要
              CONFIG_BLK_CGROUP=y
              CONFIG_CGROUP_SCHED=y
              CONFIG_CFS_BANDWIDTH=y
              
              # ---------- OverlayFS 存储驱动 ----------
              CONFIG_OVERLAY_FS=y
              CONFIG_OVERLAY_FS_REDIRECT_DIR=y
              CONFIG_OVERLAY_FS_INDEX=y
              
              # ---------- 虚拟网络接口 ----------
              CONFIG_VETH=y
              CONFIG_BRIDGE=y
              CONFIG_MACVLAN=y
              CONFIG_IPVLAN=y
              CONFIG_DUMMY=y
              
              # ---------- Netfilter / iptables（Docker 网络核心）----------
              CONFIG_NETFILTER=y
              CONFIG_NF_CONNTRACK=y
              CONFIG_NF_NAT=y
              CONFIG_NF_NAT_IPV4=y
              CONFIG_IP_NF_IPTABLES=y
              CONFIG_IP_NF_NAT=y
              CONFIG_IP_NF_TARGET_MASQUERADE=y
              CONFIG_NETFILTER_XT_MATCH_COMMENT=y
              CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
              
              # ---------- 文件系统与安全 ----------
              CONFIG_EXT4_FS=y
              CONFIG_SECCOMP=y
              CONFIG_SECCOMP_FILTER=y
              EOF

      # =========================
      # 8️⃣ 内核配置（修正致命错误：补上 cat）
      # =========================
      - name: Configure kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          export ARCH=arm64
          export O=out

          # 载入原始 defconfig
          make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

          # 如果存在 docker_config.txt 才合并（避免步骤跳过时报错）
          if [ -f ../docker_config.txt ]; then
            cat ../docker_config.txt >> out/.config
          fi

          # 补齐所有依赖选项
          make O=out ARCH=arm64 olddefconfig

      # =========================
      # 9️⃣ 设置 ccache（加速编译）
      # =========================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # =========================
      # 🔟 编译内核
      # =========================
      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

          # 添加 clang 与 ccache 到 PATH
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/clang-r450784d/bin:$PATH"
          export KBUILD_BUILD_HOST=CI
          export KBUILD_BUILD_USER=MI6

          if [ "${{ env.LLVM_CONFIG }}" = "y" ]; then
            # 全 LLVM 模式（Clang 编译 + 内置汇编/链接）
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              LLVM=1 LLVM_IAS=1 \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
          else
            # 混合模式：使用 Clang 编译 + GNU 汇编/链接
            make -j$(nproc --all) O=out ARCH=arm64 \
              CC="ccache clang" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="aarch64-linux-gnu-" \
              CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
          fi

      # =========================
      # 11️⃣ 打包内核
      # =========================
      - name: Pack kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace

          # 拉取 AnyKernel3 模板
          git clone https://github.com/osm0sis/AnyKernel3

          # 使用环境变量指定的镜像文件名，若未设置则默认 Image.gz-dtb
          IMAGE_FILE="${{ env.KERNEL_IMAGE_NAME }}"
          if [ -z "$IMAGE_FILE" ]; then
            IMAGE_FILE="Image.gz-dtb"
          fi

          cp android-kernel/out/arch/arm64/boot/${IMAGE_FILE} AnyKernel3/
          rm -rf AnyKernel3/.git*

      # =========================
      # 12️⃣ 上传制品
      # =========================
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_ZIP_NAME }}
          path: kernel_workspace/AnyKernel3/*
